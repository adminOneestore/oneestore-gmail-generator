<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Oneestore Gmail Generator</title>
  <style>
    body { font-family: Arial, sans-serif; background: #111; color: #FFD700; padding: 20px; }
    h1 { text-align: center; }
    .top-bar { display: flex; gap: 10px; align-items: center; margin-bottom: 15px; flex-wrap: wrap; }
    button { background: #FFD700; color: #111; border: none; padding: 10px 20px; font-size: 16px; cursor: pointer; border-radius: 8px; margin: 5px 0; }
    button:hover { background: #e6c200; }
    button.danger { background: #e63946; color: white; }
    button.danger:hover { background: #c1121f; }
    button.copy-btn { background: #333; color: #FFD700; border: 1px solid #FFD700; padding: 4px 10px; font-size: 12px; border-radius: 4px; margin: 0; }
    #searchBox { background: #222; color: #FFD700; border: 1px solid #FFD700; padding: 8px; width: 250px; border-radius: 8px; font-size: 14px; }
    #counter { color: #FFD700; font-size: 14px; opacity: 0.7; }
    #output { margin: 5px 0; font-weight: bold; min-height: 20px; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th, td { border: 1px solid #FFD700; padding: 8px; text-align: left; font-size: 13px; }
    th { background: #222; }
    input[type=text] { background: #222; color: #FFD700; border: 1px solid #FFD700; padding: 4px; width: 100%; }
    select { background: #222; color: #FFD700; border: 1px solid #FFD700; padding: 4px; width: 100%; }
    .status-available { color: #4caf50; font-weight: bold; }
    .status-sold { color: #e63946; font-weight: bold; }
    .status-flagged { color: #ff9800; font-weight: bold; }

    /* PIN SCREEN */
    #pinScreen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; display: flex; align-items: center;
      justify-content: center; z-index: 9999;
    }
    .pin-card {
      background: #1a1a1a; border: 1px solid #FFD700;
      border-radius: 16px; padding: 36px; width: 100%;
      max-width: 360px; text-align: center;
    }
    .pin-card h2 { color: #FFD700; margin-bottom: 6px; font-size: 20px; letter-spacing: 2px; }
    .pin-card p { color: #666; font-size: 12px; margin-bottom: 24px; }
    .pin-card input {
      width: 100%; padding: 12px 16px; background: #111;
      border: 1px solid #444; border-radius: 8px; color: #FFD700;
      font-size: 18px; text-align: center; letter-spacing: 4px;
      outline: none; margin-bottom: 14px;
    }
    .pin-card input:focus { border-color: #FFD700; }
    .pin-card button {
      width: 100%; padding: 12px; background: #FFD700;
      color: #111; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 700; cursor: pointer;
    }
    .pin-card button:hover { background: #e6c200; }
    #pinError { color: #e63946; font-size: 12px; margin-top: 10px; display: none; }
    .pin-shake { animation: shake 0.4s ease; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-8px); }
      75% { transform: translateX(8px); }
    }
  </style>
</head>
<body>

  <!-- PIN SCREEN -->
  <div id="pinScreen">
    <div class="pin-card" id="pinCard">
      <h2>⚡ ONEESTORE</h2>
      <p>Gmail Generator — internal tool</p>
      <input type="password" id="pinInput" placeholder="••••••••••" onkeydown="if(event.key==='Enter') checkPin()" autofocus />
      <button onclick="checkPin()">🔐 Masuk</button>
      <div id="pinError">❌ PIN salah. Cuba lagi.</div>
    </div>
  </div>

  <!-- MAIN APP -->
  <h1>⚡ Oneestore Gmail Generator</h1>
  <div class="top-bar">
    <button id="generateBtn">Generate Gmail</button>
    <input type="text" id="searchBox" placeholder="🔍 Cari email / player / seller..." oninput="filterTable()"/>
    <span id="counter"></span>
    <button onclick="loadEmailList()" style="padding:8px 14px;font-size:13px;">🔄 Refresh</button>
  </div>
  <div id="output"></div>
  <table id="gmailTable">
    <thead>
      <tr>
        <th>Email</th>
        <th>Password</th>
        <th>Tarikh</th>
        <th>Player List</th>
        <th>Harga (RM)</th>
        <th>Seller</th>
        <th>Status</th>
        <th>Action</th>
      </tr>
    </thead>
    <tbody></tbody>
  </table>

  <script>
    var CORRECT_PIN = "mahal12345";

    function checkPin() {
      var input = document.getElementById("pinInput").value;
      if (input === CORRECT_PIN) {
        document.getElementById("pinScreen").style.display = "none";
      } else {
        var err = document.getElementById("pinError");
        var card = document.getElementById("pinCard");
        err.style.display = "block";
        card.classList.add("pin-shake");
        setTimeout(function() { card.classList.remove("pin-shake"); }, 400);
        document.getElementById("pinInput").value = "";
      }
    }
  </script>
  <script src="main.js"></script>
</body>
</html>
